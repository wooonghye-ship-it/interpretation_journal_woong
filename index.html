<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>통역 일지</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f5;
      --panel: #ffffff;
      --panel-alt: #f9faf8;
      --line: #d8dfdc;
      --line-strong: #aebbb6;
      --text: #17211d;
      --muted: #65736d;
      --primary: #0f766e;
      --primary-strong: #0b5d57;
      --primary-soft: #d9f0ed;
      --blue: #2563eb;
      --amber: #b45309;
      --rose: #be123c;
      --shadow: 0 16px 35px rgba(20, 36, 31, 0.08);
      --radius: 8px;
      --font: "Inter", "Pretendard", "Noto Sans KR", "Apple SD Gothic Neo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.45;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      stroke-width: 2;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 180px;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      background: #173c3a;
      color: white;
      box-shadow: 0 8px 18px rgba(15, 118, 110, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 760;
      letter-spacing: 0;
    }

    .brand small {
      display: block;
      margin-top: 1px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 36px;
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, color 120ms ease, box-shadow 120ms ease;
    }

    .btn:hover {
      border-color: var(--line-strong);
      box-shadow: 0 6px 14px rgba(23, 33, 29, 0.07);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-strong);
      border-color: var(--primary-strong);
    }

    .btn-quiet {
      background: transparent;
      color: var(--muted);
    }

    .btn-danger {
      color: var(--rose);
      background: #fff7f8;
      border-color: #f5c6d1;
    }

    .icon-btn {
      width: 36px;
      padding: 0;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      width: min(1480px, 100%);
      margin: 0 auto;
      padding: 18px 24px 28px;
    }

    main.form-open {
      grid-template-columns: minmax(0, 1fr);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .entry-panel {
      display: none;
      grid-column: 1;
      grid-row: 1;
      align-self: start;
    }

    main.form-open .entry-panel {
      display: block;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 760;
    }

    .panel-meta {
      color: var(--muted);
      font-size: 12px;
    }

    form {
      padding: 16px 18px 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field.hidden {
      display: none;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: #33413c;
      font-size: 12px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--text);
      padding: 8px 10px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
    }

    .segment {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-alt);
    }

    .segment input {
      position: absolute;
      inline-size: 1px;
      block-size: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .segment label {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 30px;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 720;
    }

    .segment input:checked + label {
      background: white;
      color: var(--primary-strong);
      box-shadow: 0 2px 8px rgba(20, 36, 31, 0.08);
    }

    .mode-segment {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .range-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .duration-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      min-height: 38px;
      padding: 0 9px;
      border-radius: var(--radius);
      background: #edf7f4;
      color: var(--primary-strong);
      font-weight: 800;
      white-space: nowrap;
    }

    .form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .main-space {
      grid-column: 1;
      grid-row: 1;
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 0;
    }

    main.form-open .main-space {
      display: none;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .term-builder {
      display: grid;
      gap: 8px;
    }

    .term-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 36px;
      gap: 8px;
      align-items: start;
    }

    .term-row input {
      min-width: 0;
    }

    .term-row [data-term-description] {
      grid-column: 1 / -1;
      grid-row: 2;
    }

    .term-row [data-action="remove-term"] {
      grid-column: 3;
      grid-row: 1;
    }

    .term-actions {
      display: flex;
      justify-content: flex-start;
      margin-top: 2px;
    }

    .stat {
      padding: 14px 14px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      min-width: 0;
    }

    .stat-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .stat-value {
      margin-top: 8px;
      font-size: 24px;
      font-weight: 820;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 150px 140px 132px 132px;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-alt);
    }

    .tabs {
      display: flex;
      gap: 4px;
      padding: 10px 12px 0;
      background: var(--panel-alt);
    }

    .tab-btn {
      min-height: 34px;
      padding: 0 14px;
      border-radius: var(--radius) var(--radius) 0 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 760;
    }

    .tab-btn.active {
      background: white;
      color: var(--primary-strong);
      border: 1px solid var(--line);
      border-bottom-color: white;
    }

    .searchbox {
      position: relative;
    }

    .searchbox svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .searchbox input {
      padding-left: 34px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 280px);
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: white;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef3f1;
      color: #33413c;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    td {
      color: #26332f;
    }

    tr:hover td {
      background: #fbfdfc;
    }

    .title-cell {
      min-width: 220px;
    }

    .title-cell strong {
      display: block;
      margin-bottom: 3px;
      font-weight: 780;
      color: var(--text);
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      max-width: 160px;
      padding: 0 7px;
      border-radius: 999px;
      background: #eef2ff;
      color: #1e40af;
      font-size: 11px;
      font-weight: 720;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge.status-draft {
      background: #fff7ed;
      color: #9a3412;
    }

    .badge.status-done {
      background: #ecfdf5;
      color: #047857;
    }

    .badge.status-follow {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .badge.status-billed {
      background: #f7fee7;
      color: #3f6212;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    .empty strong {
      display: block;
      margin-bottom: 6px;
      color: var(--text);
      font-size: 16px;
    }

    .row-actions {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
    }

    main.form-open .log-table .mode-cell,
    main.form-open .log-table .tag-cell,
    main.form-open .log-table .duration-cell,
    main.form-open .log-table .memo-cell {
      display: none;
    }

    main.form-open .log-table .date-cell {
      width: 104px;
      white-space: nowrap;
    }

    main.form-open .log-table .title-cell .muted {
      display: block;
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    main.form-open .log-table .badge-row .badge:not([class*="status-"]) {
      display: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(13, 24, 20, 0.46);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: min(720px, 92vh);
      overflow: auto;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: white;
      box-shadow: 0 24px 60px rgba(6, 18, 14, 0.28);
    }

    .modal-body {
      padding: 16px 18px 18px;
      display: grid;
      gap: 12px;
    }

    .import-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-alt);
    }

    .radio {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #33413c;
      font-weight: 700;
    }

    .radio input {
      width: auto;
      min-height: auto;
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 60;
      display: grid;
      gap: 4px;
      min-width: min(360px, calc(100vw - 40px));
      padding: 12px 14px;
      border: 1px solid #c7e5df;
      border-radius: var(--radius);
      background: #f1fbf8;
      color: #17433e;
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast strong {
      font-size: 13px;
    }

    .toast span {
      color: #3f635d;
      font-size: 12px;
    }

    @media (max-width: 1160px) {
      main,
      main.form-open {
        grid-template-columns: 1fr;
      }

      .entry-panel {
        grid-column: 1;
        grid-row: 1;
        position: static;
        max-height: none;
      }

      main.form-open .main-space {
        grid-row: 2;
      }

      .stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .table-wrap {
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        padding: 12px 14px;
      }

      .brand {
        min-width: 0;
      }

      .brand small {
        white-space: normal;
      }

      .toolbar {
        width: auto;
      }

      .toolbar .btn span {
        display: none;
      }

      main {
        padding: 12px;
      }

      .field-grid,
      .filters,
      .stats-grid,
      .term-row {
        grid-template-columns: 1fr;
      }

      .range-row {
        grid-template-columns: 1fr 1fr;
      }

      .duration-chip {
        grid-column: 1 / -1;
      }

      .form-actions {
        flex-direction: column-reverse;
        align-items: stretch;
      }

      .form-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden">
    <symbol id="icon-book" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
      <path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path>
      <path d="M8 7h8"></path>
      <path d="M8 11h6"></path>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 5v14"></path><path d="M5 12h14"></path>
    </symbol>
    <symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M15.2 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.8z"></path>
      <path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path>
    </symbol>
    <symbol id="icon-upload" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path>
    </symbol>
    <symbol id="icon-download" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path>
    </symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M12 20h9"></path>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path>
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M3 6h18"></path><path d="M8 6V4h8v2"></path>
      <path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path>
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M18 6L6 18"></path><path d="M6 6l12 12"></path>
    </symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path>
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M20 6L9 17l-5-5"></path>
    </symbol>
    <symbol id="icon-filter" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M4 5h16"></path><path d="M7 12h10"></path><path d="M10 19h4"></path>
    </symbol>
    <symbol id="icon-sync" viewBox="0 0 24 24" fill="none" stroke="currentColor">
      <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
      <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
      <path d="M18 2v4h-4"></path>
      <path d="M6 22v-4h4"></path>
    </symbol>
  </svg>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><svg><use href="#icon-book"></use></svg></div>
        <div>
          <h1>통역 일지</h1>
          <small id="storageMeta">로컬 작업 공간</small>
        </div>
      </div>
      <div class="toolbar">
        <button class="btn btn-primary" type="button" id="newBtn" title="새 일지">
          <svg><use href="#icon-plus"></use></svg><span>새 일지</span>
        </button>
        <button class="btn" type="button" id="importBtn" title="CSV 가져오기">
          <svg><use href="#icon-upload"></use></svg><span>가져오기</span>
        </button>
        <button class="btn" type="button" id="exportBtn" title="CSV 내보내기">
          <svg><use href="#icon-download"></use></svg><span>내보내기</span>
        </button>
        <button class="btn" type="button" id="syncSettingsBtn" title="Google Sheets 동기화">
          <svg><use href="#icon-sync"></use></svg><span>동기화</span>
        </button>
      </div>
    </header>

    <main id="appMain">
      <section class="panel entry-panel" aria-label="통역 일지 작성">
        <div class="panel-header">
          <div>
            <h2 class="panel-title" id="formTitle">새 기록</h2>
            <div class="panel-meta" id="formMeta">필수 항목은 날짜와 제목입니다.</div>
          </div>
          <button class="btn icon-btn btn-quiet" type="button" id="clearBtn" title="입력 닫기">
            <svg><use href="#icon-x"></use></svg>
          </button>
        </div>
        <form id="entryForm">
          <input type="hidden" id="entryId">
          <div class="field-grid">
            <div class="field full" id="calendarPasteField">
              <label for="calendarPaste">팀업 캘린더 붙여넣기</label>
              <textarea id="calendarPaste" name="calendarPaste" placeholder="팀업 캘린더 내용을 그대로 붙여넣으면 아래 항목이 자동으로 채워집니다."></textarea>
            </div>
            <div class="field">
              <label for="date">날짜</label>
              <input id="date" name="date" type="date" required>
            </div>
            <div class="field">
              <label for="status">상태</label>
              <select id="status" name="status">
                <option value="draft">초안</option>
                <option value="done">완료</option>
                <option value="follow">후속</option>
                <option value="billed">정산</option>
              </select>
            </div>
            <div class="field">
              <label for="sessionType">회의 형태</label>

            "issues": "I understand the need to move the finance stuff. It's just a matter of how i think he might even have to initialize that or something, so.. for Steam anyway. \nfinance 때문에 변경이 필요하다는걸 저는 이해하지만 Ted님이 그걸 어떻게 하셔야할거에요. steam쪽도 어짜피 테드님이 하셔야하고..\n\nGBD팀\n\nAll of the development side things that need to happen to enable this, we’re already in compliance with. We support the cloud gaming, and we support cross-plan devices and all that stuff, so.. I did talk with Xbox at GCD about Gen 10, and they did say they were still a little ways out from disclosing, but I think they said they were disclosing Krafton in the next month or so. On some of the details with that. I might be mistaken. But I’m pretty sure that’s what they had said, so.. but they also said it’s very similar to what they’re doing with the Rog Ally. The games are headed more into a PC base, and so if you’re already building for Win PC, you’re basically building for Gen 10. And if that’s the case, then I don’t see that as a very high risk, and I think we would obviously want to support the launch console on Xbox when it did come, you know, when it did get released with SN2, so I don’t see this as a high risk, and as you point out, the revenue gain is significant and should be an easy win for everybody, so yeah. Agreed. We should move forward with this. \n구현을 위한 개발 측면 요구사항은 이미 충족하고 있음. 클라우드 게이밍, 크로스 플랫폼 기기 등을 지원하고 있음. GDC에서 Xbox와 Gen10 관련 얘기 했는데, 아직 공개까지는 시간이 좀 남았다고 했음. 근데 한 달 내외로 크래프톤에 일부 내용 공유할 예정이라고 들었다. 그리고 Rog Ally에서 하고 있는 방식과 매우 유사하다고 했다. 게임들이 점점 pc기반으로 가고 있어서 이미 windows PC 용으로 개발하고 있다면 사실상 Gen10 용으로 개발하고 있는 셈이라고. 그래서 리스크가 크다고 보지 않음. 그리고 xbox 차세대 콘솔이 출시되면 당연히 지원하고 싶을 것. 그래서 리스크가 크지 않다고 생각. 그리고 말씀하셨듯 수익 증가 효과도 크기때문에 모두에게 좋은 기회가 될 거라고 생각. \n*실제 통역: 실제 통역: 네 괜찮은 것 같아요. 지금 개발 쪽은 이미 저희가 클라우드 게임이이나 크로스 플레이 devices 이런거 다 지원하고 있기 때문에 잘 맞고 있다고 생각하고요. GC..GDC와 Gen10관련해서 얘기를 했는데 Xbox 쪽에서 크래프톤에 아마 다음달쯤 디테일을 공개할 거라고 했거든요. 틀릴 수도 있지만. 근데 어쨌든 PC 기반의 아키텍처로 갈거고 그래서 PC 기반으로 이미 빌딩을 하고 있으면 Gen10은 문제가 없을거고… 그리고 SN2 런칭했을 때 크게 문제가 없을거라고 저도 알고 있기 때문에 이게 큰 위험 요소라고 생각을 하지 않습니다. 그래서 저는 이거와 그대로 진행하는거 동의합니다. \n--> 중요한 포인트 일부 누락\n빠진 핵심\n❌ “ROG Ally 비교” → 매우 중요한 비유\n❌ 차세대 콘솔 지원 내용\n❌ “revenue gain is significant” → 돈 얘기 빠짐",

            "issues": "기술적인 문제로 제대로 통역을 하지 못함.",
            "followUp": "이어폰 여유분을 챙겨야할 듯.\n\n높은 단가라는 것은 유저 많고 광고 효과가 좋아서 광고주가 더 비싸게라도 그 inventory를 사고 싶어한다는 뜻. \n변동형 variable: 광고 많이 보면 돈 많이 받음\n고정형 fixed: 정액 요금\n자체 네트워크로 처리한다 = 외부 도움 없이 광고를 처리한다. \n좋은 자리는 높은 단가로 팔 수 있다.\n\n* 유저가 페이지/앱 하나 열 때마다 대략 이런 순서가 100ms 안에 돌아감:\n1. User → Publisher\n- 유저가 뉴스 사이트나 앱 화면을 연다.\n- 페이지에 “광고 자리 하나 비어 있음”.\n2. Publisher → Ad Server / SSP\n- 퍼블리셔의 Ad Server/SSP가\n“여기 300×250 배너, 이런 유저(쿠키·ID·위치·디바이스)인데 살 사람?”라고 SSP에 인벤토리+유저 정보를 넘김.\n3. SSP → Ad Exchange\nSSP는 이 노출 기회를 Ad Exchange에 올려서 경매 시작. 동시에 여러 Ad Exchange·DSP·Ad Network에 뿌려서 제일 비싼 놈 찾으려 함. \n4. Ad Exchange → 여러 DSP\nAd Exchange는 연결된 여러 DSP에게 “이 슬롯, 이 유저, 입찰할래?” 하고 요청. \n5. 각 DSP 내부에서 하는 일\nDSP는 광고주 캠페인 설정 + DMP·퍼스트파티 데이터로 “이 유저가 우리 타겟인가?” “이 노출에 최대 얼마까지 낼 가치가 있나?” 분석\n그 결과로 입찰가(bid price) + 광고 크리에이티브를 Ad Exchange에 응답.\n6. Ad Exchange에서 경매 / 낙찰\n- Ad Exchange가 가장 높은 유효 입찰가를 고르고 낙찰자 결정\n- 2nd-price, 1st-price 등 경매 모델로 실제 지불가를 계산\n7. 광고 송출\n- 낙찰된 DSP → SSP/Ad Server로 광고 태그 전달\n- 퍼블리셔 페이지에 최종 광고 노출\n=>이 모든 게 페이지 한 번 띄울 때마다, 100ms 이내에 계속 반복.",

러에 대한 eta는 아직 없지만, 최대한 빠르게 배송하려고 노력중이라고 합니다. 저희가 이 컨트롤러를 여러 용도의 경품으로 활용할 계획인건 알고 있는데, 이 부분은 그대로 진행해도 괜찮을지에 달려 있습니다.\nwe've been trying to shepherd that trailer video asset along, but it has now been Richard has now said that there's a CTA that needs to be on the end of this trailer. Also, we don't have visibility on the intent of this trailer for the controller, because it's not just the controller, it's the stand for the controller as well, this trailer.\n그래서 저희가 그.. 트레일러 비디오 에셋을 관리하고 있는데 리차드님 말에 따르면 그 트레일러 말미에 그 CTA가 있다고 해요. 그리고 리차드님이 그 트레일러의 목적에 대한 비저빌리티가 없으시고 컨트롤러 뿐만이 아니라 스탠드에 대한 것도 없으시다고 해요. \n-> 트레일러 영상 에셋을 관리하고 있는데, 라치드님 쪽에서 이 트레일러 말미에 CTA가 들어가야 한다고 하세요. 또 이 트레일러의 목적에 대해서도 현재 비저빌리티가 없는 상황입니다. 이 영상이 단순히 컨트롤러만이 아니라 컨트롤러 스탠드까지 함께 홍보하는 내용이기 때문에.",

nd what we propose here is a metal transfer strip similar to what we've been using in other flooring transition details. But there are flexible products on the market which allow themselves to be curved.\n그리고 여기서 제안하는 것은 다른 바닥재 이음새 디테일에서 사용해 온 것과 유사한 금속 이음판입니다. 하지만 시중에는 곡선 형태로 구부릴 수 있는 유연한 제품들도 있습니다.\nKI\nKINZO (EN)\n16:55\nSo this is what we would propose to solve those moments on the Floor Foodish plan.\n그래서 이것이 바로 Floor Foodish 플랜에서 이러한 부분을 해결하기 위해 제안하는 방안입니다.\nKE\nKINZO // Eliana (PL)\n16:55\nOkay, and I will then continue with the last topic, but if you can stop sharing, thank you. So I I guess you see my screen by now.\n네, 그럼 마지막 주제로 넘어가겠습니다만, 공유는 잠시 멈춰 주시면 감사하겠습니다. 자, 이제 제 화면이 보이시겠죠.\nKE\nKINZO // Eliana (PL)\n16:55\nAnd I wanted just to give a small update. It's mostly for related to the documentation package.\n그리고 간단한 업데이트를 드리고 싶었습니다. 주로 문서화 패키지와 관련된 내용입니다.\nKE\nKINZO // Eliana (PL)\n16:55\nAnd the world details. So probably more interesting for cookbook.\n그리고 월드 디테일 부분도요. 아마 쿡북을 사용하시는 분들께 더 흥미로울 것 같습니다.\nKE\nKINZO // Eliana (PL)\n16:55\nSo in the upper part we see how we represented the world details for the PUBG submission. And we based this strategy on some documents that we received back then when we planned PUBG's virtual offices.\n위쪽 부분에서는 PUBG 제출물을 위해 월드 디테일을 어떻게 표현했는지 볼 수 있습니다. 이 전략은 우리가 PUBG의 가상 사무실을 기획할 당시 받았던 몇 가지 문서를 바탕으로 수립했습니다.\nKE\nKINZO // Eliana (PL)\n16:56\nIn this case, we were considering so when we had one wall with two finishes on each side for us this was a package and this package got a code we Started with the same approach for the craft and floors but We noticed that this was bringing so and for PUBG with this With this strategy we reach like I don't know 15 Codes so 15 details and we thought it was a good amount to communicate all the information for the wool materials. But not creating to many details that could bring to confusion.\n이 경우, 한쪽 벽면에 양면 마감재가 적용된 상황을 고려했을 때, 우리는 이를 하나의 패키지로 간주했고 이 패키지에 코드를 부여했습니다. 우리는 크래프트와 바닥재에 대해서도 동       $("endTime").addEventListener("input", updateDuration);

      document.querySelectorAll(".tab-btn").forEach((button) => {

        if (event.key === "Escape" && $("importModal").classList.contains("open")) {
          closeImport();

        if (event.key === "Escape" && $("syncModal").classList.contains("open")) {

        }
      });
    }

    function handleCalendarPaste() {
      const text = $("calendarPaste").value.trim();
      if (!text) return;
      const parsed = parseCalendarText(text);
      let applied = false;
      if (parsed.project) { $("project").value = parsed.project; applied = true; }
      if (parsed.date) { $("date").value = parsed.date; applied = true; }
      if (parsed.startTime) { $("startTime").value = parsed.startTime; applied = true; }
      if (parsed.endTime) { $("endTime").value = parsed.endTime; applied = true; }
      if (parsed.sessionType) { $("sessionType").value = parsed.sessionType; applied = true; }
      if (parsed.requester) { $("requester").value = parsed.requester; applied = true; }
      if (parsed.team) { $("client").value = parsed.team; applied = true; }
      if (parsed.meetingLink) { $("meetingLink").value = parsed.meetingLink; applied = true; }
      if (parsed.mode) { setMode(parsed.mode); applied = true; }
      if (parsed.tags.length) {
        const current = splitTags($("tags").value);
        $("tags").value = unique([...current, ...parsed.tags]).join(", ");
        applied = true;
      }
      if (applied) {
        $("calendarPaste").value = "";
        $("calendarPasteField").classList.add("hidden");
      }
      updateDuration();
    }

    function parseCalendarText(text) {
      const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      const firstDateIndex = lines.findIndex((line) => parseCalendarDateLine(line).date);
      const project = firstDateIndex > 0 ? lines[0] : "";
      const dateInfo = firstDateIndex >= 0 ? parseCalendarDateLine(lines[firstDateIndex]) : {};
      const sessionType = getAfterLabel(lines, "Type");
      const requester = getAfterLabel(lines, "Requester Name & Email");
      const meetingRoom = getAfterLabel(lines, "Meeting Room/Call Link");
      const meetingLink = extractUrl(meetingRoom) || extractUrl(text);
      const team = getAfterLabel(lines, "Team");
      const titleTag = extractBracketTag(project);
      const tags = [titleTag].filter(Boolean);
      const modeSource = [sessionType, meetingRoom, meetingLink].filter(Boolean).join(" ");

      return {
        project,
        date: dateInfo.date || "",
        startTime: dateInfo.startTime || "",
        endTime: dateInfo.endTime || "",
        sessionType,
        requester,
        team,
        meetingLink,
        mode: modeSource ? normalizeMode(modeSource) : "",
        tags
      };
    }

    function getAfterLabel(lines, label) {
      const normalizedLabel = normalizeHeader(label);
      const index = lines.findIndex((line) => normalizeHeader(line).startsWith(normalizedLabel));
      if (index < 0) return "";
      const sameLine = lines[index].slice(label.length).trim();
      if (sameLine) return sameLine;
      return lines[index + 1] || "";
    }

    function getSectionText(lines, startLabel, stopLabels) {
      const startIndex = lines.findIndex((line) => line.toLowerCase().startsWith(startLabel.toLowerCase()));
      if (startIndex < 0) return "";
      const firstLine = lines[startIndex].slice(startLabel.length).trim();
      const collected = firstLine ? [firstLine] : [];
      for (let index = startIndex + 1; index < lines.length; index += 1) {
        if (stopLabels.some((label) => lines[index].toLowerCase().startsWith(label.toLowerCase()))) break;
        collected.push(lines[index]);
      }
      return collected.join("\n").trim();
    }

    function parseCalendarDateLine(line) {
      const match = String(line || "").match(/\b(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+([A-Z][a-z]{2})\s+(\d{1,2})\s+(\d{4}),\s+(.+?)\s*-\s*(.+)$/i);
      if (!match) return {};
      const months = { jan: "01", feb: "02", mar: "03", apr: "04", may: "05", jun: "06", jul: "07", aug: "08", sep: "09", oct: "10", nov: "11", dec: "12" };
      const month = months[match[1].slice(0, 3).toLowerCase()];
      const date = `${match[3]}-${month}-${match[2].padStart(2, "0")}`;
      const startTime = parseClockTime(match[4]);
      const endTime = parseClockTime(match[5], match[4]);
      return { date, startTime, endTime };
    }

    function parseClockTime(value, fallbackMeridiemSource = "") {
      const fallback = String(fallbackMeridiemSource).match(/\b(am|pm)\b/i)?.[1] || "";
      const match = String(value || "").trim().match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
      if (!match) return "";
      let hour = Number(match[1]);
      const minute = Number(match[2] || 0);
      const meridiem = (match[3] || fallback).toLowerCase();
      if (meridiem === "pm" && hour < 12) hour += 12;
      if (meridiem === "am" && hour === 12) hour = 0;
      return `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`;
    }

    function extractUrl(value) {
      return String(value || "").match(/https?:\/\/\S+/)?.[0]?.replace(/[)\]]$/, "") || "";
    }

    function extractBracketTag(value) {
      return String(value || "").match(/^\[([^\]]+)\]/)?.[1]?.trim() || "";
    }

    function getScheduleTag(lines) {
      const schedule = lines.find((line) => line.includes("_Schedule"));
      return schedule?.split(">").pop()?.trim() || "";
    }

    function loadEntries() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : SEED_ENTRIES.map((entry) => ({ ...entry }));
      } catch {
        return SEED_ENTRIES.map((entry) => ({ ...entry }));
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
      $("storageMeta").textContent = `${state.entries.length.toLocaleString("ko-KR")}건 저장됨`;
    }

    function loadSyncSettings() {
      try {
        const raw = localStorage.getItem(SYNC_SETTINGS_KEY);
        return raw ? JSON.parse(raw) : { endpoint: "", enabled: false };
      } catch {
        return { endpoint: "", enabled: false };
      }
    }

    function saveSyncSettingsToStorage() {
      localStorage.setItem(SYNC_SETTINGS_KEY, JSON.stringify(syncState.settings));
    }

    function loadSyncQueue() {
      try {
        const raw = localStorage.getItem(SYNC_QUEUE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function persistSyncQueue() {
      localStorage.setItem(SYNC_QUEUE_KEY, JSON.stringify(syncState.queue));
    }

    function openSyncSettings() {
      $("syncEndpoint").value = syncState.settings.endpoint || "";
      $("syncEnabled").checked = Boolean(syncState.settings.enabled);
      renderSyncStatus();
      $("syncModal").classList.add("open");
      $("syncEndpoint").focus();
    }

    function closeSyncSettings() {
      $("syncModal").classList.remove("open");
    }

    function saveSyncSettings() {
      const endpoint = $("syncEndpoint").value.trim();
      const enabled = $("syncEnabled").checked;
      if (enabled && !isValidSyncEndpoint(endpoint)) {
        toast("동기화 설정 확인", "Apps Script 웹 앱 URL을 입력해 주세요.");
        return;
      }
      syncState.settings = { endpoint, enabled };
      saveSyncSettingsToStorage();
      renderSyncStatus();
      toast("동기화 설정 저장됨", enabled ? "자동 동기화가 켜졌습니다." : "자동 동기화가 꺼졌습니다.");
      if (enabled) syncPendingEntries({ silent: true });
    }

    function renderSyncStatus() {
      const pending = syncState.queue.length;
      const enabled = syncState.settings.enabled && isValidSyncEndpoint(syncState.settings.endpoint);
      const label = enabled ? `동기화 켜짐 · 대기 ${pending}건` : `동기화 꺼짐 · 대기 ${pending}건`;
      $("storageMeta").textContent = `${state.entries.length.toLocaleString("ko-KR")}건 저장됨 · ${label}`;
      if ($("syncStatusText")) $("syncStatusText").value = label;
    }

    function isValidSyncEndpoint(value) {
      return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/i.test(String(value || "").trim());
    }

    function queueEntryForSync(entry) {
      if (!syncState.settings.enabled || !isValidSyncEndpoint(syncState.settings.endpoint)) return;
      const payload = buildSheetPayload(entry);
      const index = syncState.queue.findIndex((item) => item.id === payload.id);
      if (index >= 0) {
        syncState.queue[index] = payload;
      } else {
        syncState.queue.push(payload);
      }
      persistSyncQueue();
      renderSyncStatus();
    }

    async function syncPendingEntries(options = {}) {
      const silent = Boolean(options.silent);
      if (syncState.busy) return;
      if (!syncState.settings.enabled || !isValidSyncEndpoint(syncState.settings.endpoint)) {
        if (!silent) toast("동기화 설정 필요", "Apps Script 웹 앱 URL을 저장해 주세요.");
        return;
      }
      if (!syncState.queue.length) {
        if (!silent) toast("동기화 완료", "대기 중인 기록이 없습니다.");
        return;
      }

      syncState.busy = true;
      renderSyncStatus();
      const pending = [...syncState.queue];
      const syncedIds = [];
      try {
        for (const payload of pending) {
          await postToSheet(payload);
          syncedIds.push(payload.id);
        }
        syncState.queue = syncState.queue.filter((item) => !syncedIds.includes(item.id));
        persistSyncQueue();
        renderSyncStatus();
        if (!silent || syncedIds.length) toast("Google Sheets 동기화", `${syncedIds.length}건 반영됨`);
      } catch (error) {
        renderSyncStatus();
        if (!silent) toast("동기화 실패", error.message || "잠시 후 다시 시도해 주세요.");
      } finally {
        syncState.busy = false;
      }
    }

    async function postToSheet(payload) {
      const body = JSON.stringify({ endpoint: syncState.settings.endpoint, record: payload });
      if (window.location.protocol.startsWith("http")) {
        const proxied = await postViaProxy(body);
        if (proxied) return proxied;
      }

      await fetch(syncState.settings.endpoint, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({ action: "upsert", record: payload })
      });
      return { ok: true, opaque: true };
    }

    async function postViaProxy(body) {
      const response = await fetch("/api/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body
      });
      if (response.status === 404 || response.status === 501) return null;

      let result = {};
      try {
        result = await response.json();
      } catch {
        result = {};
      }
      if (!response.ok || result.ok === false) {
        throw new Error(result.error || `동기화 서버 오류 (${response.status})`);
      }
      return result;
    }

    function buildSheetPayload(entry) {
      const tags = Array.isArray(entry.tags) ? entry.tags : splitTags(entry.tags || "");
      return {
        id: entry.id,
        date: entry.date || "",
        sessionType: entry.sessionType || "",
        mode: getEntryMode(entry),
        project: entry.project || "",
        team: entry.client || "",
        requester: entry.requester || "",
        meetingLink: entry.meetingLink || "",
        startTime: entry.startTime || "",
        endTime: entry.endTime || "",
        durationMinutes: safeNumber(entry.durationMinutes),
        summary: entry.summary || "",
        issues: entry.issues || "",
        followUp: entry.followUp || "",
        terms: entry.terms || "",
        memo: entry.memo || "",
        tags: tags.join(", "),
        updatedAt: entry.updatedAt || new Date().toISOString()
      };
    }

    function setDefaultDate() {
      $("date").value = toDateInput(new Date());
    }

    function toDateInput(date) {
      const offset = date.getTimezoneOffset() * 60000;
      return new Date(date.getTime() - offset).toISOString().slice(0, 10);
    }

    function openNewEntryForm() {
      resetForm();
      openEntryPanel();
      $("calendarPaste").focus();
    }

    function openEntryPanel() {
      $("appMain").classList.add("form-open");
    }

    function closeEntryForm() {
      resetForm();
      $("appMain").classList.remove("form-open");
    }

    function saveEntry(event) {
      event.preventDefault();
      const entry = readForm();
      if (!entry.date || !entry.project.trim()) {
        toast("저장 보류", "날짜와 제목을 확인해 주세요.");
        return;
      }

      const now = new Date().toISOString();
      const currentId = $("entryId").value;
      if (currentId) {
        const index = state.entries.findIndex((item) => item.id === currentId);
        if (index >= 0) {
          entry.id = currentId;
          entry.createdAt = state.entries[index].createdAt || now;
          entry.updatedAt = now;
          state.entries[index] = entry;
        }
      } else {
        entry.id = crypto.randomUUID ? crypto.randomUUID() : `entry-${Date.now()}`;
        entry.createdAt = now;
        entry.updatedAt = now;
        state.entries.unshift(entry);
      }
      persist();
      render();
      editEntry(entry.id);
      toast("저장됨", entry.project);
      queueEntryForSync(entry);
      syncPendingEntries({ silent: true });
    }

    function readForm() {
      const mode = document.querySelector("input[name='mode']:checked")?.value || "순차";
      return {
        date: $("date").value,
        status: $("status").value,
        sessionType: $("sessionType").value.trim(),
        project: $("project").value.trim(),
        client: $("client").value.trim(),
        requester: $("requester").value.trim(),
        mode,
        meetingLink: $("meetingLink").value.trim(),
        domain: splitTags($("tags").value)[0] || "",
        startTime: $("startTime").value,
        endTime: $("endTime").value,
        durationMinutes: getDurationMinutes($("startTime").value, $("endTime").value),
        summary: $("summary").value.trim(),
        terms: serializeTermRows(),
        issues: $("issues").value.trim(),
        followUp: $("followUp").value.trim(),
        memo: $("memo").value.trim(),
        tags: splitTags($("tags").value)
      };
    }

    function fillForm(entry) {
      $("entryId").value = entry.id || "";
      $("date").value = entry.date || toDateInput(new Date());
      $("status").value = normalizeStatus(entry.status);
      $("sessionType").value = entry.sessionType || "";
      $("project").value = entry.project || "";
      $("client").value = entry.client || "";
      $("requester").value = entry.requester || "";
      setMode(getEntryMode(entry));
      $("meetingLink").value = entry.meetingLink || "";
      $("startTime").value = entry.startTime || "";
      $("endTime").value = entry.endTime || "";
      $("summary").value = entry.summary || "";
      renderTermRows(parseTermsText(entry.terms));
      $("issues").value = entry.issues || "";
      $("followUp").value = entry.followUp || "";
      $("memo").value = entry.memo || "";
      $("tags").value = Array.isArray(entry.tags) && entry.tags.length ? entry.tags.join(", ") : (entry.domain || entry.tags || "");
      $("calendarPaste").value = "";
      $("calendarPasteField").classList.toggle("hidden", Boolean(entry.id));
      $("formTitle").textContent = entry.id ? "기록 편집" : "새 기록";
      $("formMeta").textContent = entry.updatedAt ? `수정 ${formatDateTime(entry.updatedAt)}` : "필수 항목은 날짜와 제목입니다.";
      $("deleteCurrentBtn").style.visibility = entry.id ? "visible" : "hidden";
      openEntryPanel();
      updateDuration();
    }

    function resetForm() {
      $("entryForm").reset();
      $("entryId").value = "";
      setDefaultDate();
      setMode("원격");
      $("status").value = "draft";
      $("calendarPasteField").classList.remove("hidden");
      $("formTitle").textContent = "새 기록";
      $("formMeta").textContent = "필수 항목은 날짜와 제목입니다.";
      $("deleteCurrentBtn").style.visibility = "hidden";
      renderTermRows([]);
      updateDuration();
    }

    function editEntry(id) {
      const entry = state.entries.find((item) => item.id === id);
      if (!entry) return;
      fillForm(entry);
      if (window.matchMedia("(max-width: 1160px)").matches) {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function deleteCurrentEntry() {
      const id = $("entryId").value;
      if (!id) return;
      const entry = state.entries.find((item) => item.id === id);
      if (!entry) return;
      const ok = window.confirm(`'${entry.project || "선택한 기록"}'을 삭제할까요?`);
      if (!ok) return;
      state.entries = state.entries.filter((item) => item.id !== id);
      persist();
      closeEntryForm();
      render();
      toast("삭제됨", entry.project || "기록");
    }

    function deleteEntry(id) {
      const entry = state.entries.find((item) => item.id === id);
      if (!entry) return;
      const ok = window.confirm(`'${entry.project || "선택한 기록"}'을 삭제할까요?`);
      if (!ok) return;
      state.entries = state.entries.filter((item) => item.id !== id);
      persist();
      if ($("entryId").value === id) closeEntryForm();
      render();
      toast("삭제됨", entry.project || "기록");
    }

    function renderTermRows(terms) {
      const rows = (terms || []).filter((term) => term.source || term.translation || term.description);
      $("termBuilder").innerHTML = "";
      (rows.length ? rows : [{ source: "", translation: "", description: "" }]).forEach(addTermRow);
      updateTermsValue();
    }

    function addTermRow(term = {}) {
      const row = document.createElement("div");
      row.className = "term-row";
      row.dataset.termRow = "true";
      row.innerHTML = `
        <input type="text" data-term-source aria-label="용어 원문" placeholder="원문" value="${escapeHtml(term.source || "")}">
        <input type="text" data-term-translation aria-label="용어 번역" placeholder="번역" value="${escapeHtml(term.translation || "")}">
        <input type="text" data-term-description aria-label="용어 메모" placeholder="메모 (선택)" value="${escapeHtml(term.description || "")}">
        <button class="btn icon-btn btn-quiet" type="button" title="용어 삭제" data-action="remove-term">
          <svg><use href="#icon-trash"></use></svg>
        </button>`;
      $("termBuilder").appendChild(row);
      updateTermsValue();
    }

    function removeTermRow(button) {
      const row = button.closest("[data-term-row]");
      if (!row) return;
      const rows = [...$("termBuilder").querySelectorAll("[data-term-row]")];
      if (rows.length <= 1) {
        row.querySelectorAll("input").forEach((input) => { input.value = ""; });
      } else {
        row.remove();
      }
      updateTermsValue();
    }

    function readTermRows() {
      return [...$("termBuilder").querySelectorAll("[data-term-row]")]
        .map((row) => ({
          source: row.querySelector("[data-term-source]").value.trim(),
          translation: row.querySelector("[data-term-translation]").value.trim(),
          description: row.querySelector("[data-term-description]").value.trim()
        }))
        .filter((term) => term.source || term.translation || term.description);
    }

    function serializeTermRows() {
      const value = readTermRows().map(formatTermLine).join("\n");
      $("terms").value = value;
      return value;
    }

    function updateTermsValue() {
      $("terms").value = readTermRows().map(formatTermLine).join("\n");
    }

    function formatTermLine(term) {
      return [term.source, term.translation, term.description]
        .map((value) => String(value || "").trim())
        .filter(Boolean)
        .join(" - ");
    }

    function setMode(value) {
      const normalized = normalizeMode(value);
      const radio = [...document.querySelectorAll("input[name='mode']")].find((item) => item.value === normalized);
      (radio || $("modeRemote")).checked = true;
    }

    function render() {
      persist();
      renderStats();
      renderTable();
      renderDatalists();
      renderSyncStatus();
      $("deleteCurrentBtn").style.visibility = $("entryId").value ? "visible" : "hidden";
    }

    function renderStats() {
      const count = state.entries.length;
      const totalMinutes = state.entries.reduce((sum, entry) => sum + safeNumber(entry.durationMinutes), 0);
      $("statCount").textContent = count.toLocaleString("ko-KR");
      $("statHours").textContent = formatHours(totalMinutes);
    }

    function renderTable() {
      const entries = filteredEntries();
      if (state.activeView === "terms") {
        renderTermsTable(entries);
        return;
      }
      if (!entries.length) {
        $("tableWrap").innerHTML = `
          <div class="empty">
            <div>
              <strong>표시할 기록이 없습니다.</strong>
              <span>새 일지를 저장하거나 CSV를 가져오면 목록에 나타납니다.</span>
            </div>
          </div>`;
        return;
      }

      const rows = entries.map((entry) => {
        const status = normalizeStatus(entry.status);
        const tags = Array.isArray(entry.tags) ? entry.tags : splitTags(entry.tags || "");
        return `
          <tr>
            <td class="date-cell">${escapeHtml(formatDate(entry.date))}</td>
            <td class="title-cell">
              <strong>${escapeHtml(entry.project || "-")}</strong>
              <span class="muted">${escapeHtml([entry.client, entry.requester, entry.sessionType].filter(Boolean).join(" / ") || "-")}</span>
              <div class="badge-row">
                <span class="badge status-${status}">${escapeHtml(statusLabels[status] || status)}</span>
                ${tags.slice(0, 3).map((tag) => `<span class="badge">${escapeHtml(tag)}</span>`).join("")}
              </div>
            </td>
            <td class="mode-cell">${escapeHtml(getEntryMode(entry))}</td>
            <td class="tag-cell">${escapeHtml(tags.join(", ") || entry.domain || "-")}</td>
            <td class="duration-cell">${escapeHtml(formatMinutes(entry.durationMinutes))}</td>
            <td class="memo-cell">${escapeHtml(shortText(entry.summary || entry.issues || entry.followUp || entry.memo || "", 120))}</td>
            <td class="actions-cell">
              <div class="row-actions">
                <button class="btn icon-btn btn-quiet" type="button" title="편집" data-action="edit" data-id="${entry.id}">
                  <svg><use href="#icon-edit"></use></svg>
                </button>
                <button class="btn icon-btn btn-quiet" type="button" title="삭제" data-action="delete" data-id="${entry.id}">
                  <svg><use href="#icon-trash"></use></svg>
                </button>
              </div>
            </td>
          </tr>`;
      }).join("");

      $("tableWrap").innerHTML = `
        <table class="log-table">
          <thead>
            <tr>
              <th class="date-cell">날짜</th>
              <th class="title-cell">제목</th>
              <th class="mode-cell">방식</th>
              <th class="tag-cell">태그</th>
              <th class="duration-cell">분량</th>
              <th class="memo-cell">메모</th>
              <th class="actions-cell"></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;

      $("tableWrap").querySelectorAll("[data-action='edit']").forEach((button) => {
        button.addEventListener("click", () => editEntry(button.dataset.id));
      });
      $("tableWrap").querySelectorAll("[data-action='delete']").forEach((button) => {
        button.addEventListener("click", () => deleteEntry(button.dataset.id));
      });
    }

    function renderTermsTable(entries) {
      const termRows = entries.flatMap((entry) => extractTerms(entry).map((term) => ({ entry, term })));
      if (!termRows.length) {
        $("tableWrap").innerHTML = `
          <div class="empty">
            <div>
              <strong>아직 용어가 없습니다.</strong>
              <span>일지의 용어 입력란에 원문과 번역을 추가하면 이 탭에 모입니다.</span>
            </div>
          </div>`;
        return;
      }

      const rows = termRows.map(({ entry, term }) => {
        return `
          <tr>
            <td><strong>${escapeHtml(term.source || "-")}</strong></td>
            <td>${escapeHtml(term.translation || "-")}</td>
            <td>${escapeHtml(term.description || "-")}</td>
            <td class="title-cell">
              <strong>${escapeHtml(entry.project || "-")}</strong>
            </td>
            <td>${escapeHtml(formatDate(entry.date))}</td>
            <td>
              <div class="row-actions">
                <button class="btn icon-btn btn-quiet" type="button" title="원본 편집" data-action="edit" data-id="${entry.id}">
                  <svg><use href="#icon-edit"></use></svg>
                </button>
              </div>
            </td>
          </tr>`;
      }).join("");

      $("tableWrap").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>원문</th>
              <th>번역</th>
              <th>설명</th>
              <th>회의명</th>
              <th>등록날짜</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;

      $("tableWrap").querySelectorAll("[data-action='edit']").forEach((button) => {
        button.addEventListener("click", () => editEntry(button.dataset.id));
      });
    }

    function filteredEntries() {
      const query = ($("searchInput").value || "").trim().toLowerCase();
      const mode = $("modeFilter").value;
      const status = $("statusFilter").value;
      const from = $("fromFilter").value;
      const to = $("toFilter").value;
      return [...state.entries]
        .filter((entry) => !mode || getEntryMode(entry) === mode)
        .filter((entry) => !status || normalizeStatus(entry.status) === status)
        .filter((entry) => !from || (entry.date || "") >= from)
        .filter((entry) => !to || (entry.date || "") <= to)
        .filter((entry) => {
          if (!query) return true;
          return [
            entry.date, entry.project, entry.client, entry.requester, getEntryMode(entry),
            entry.sessionType, entry.meetingLink, entry.domain,
            entry.summary, entry.terms, entry.issues,
            entry.followUp, entry.memo, Array.isArray(entry.tags) ? entry.tags.join(" ") : entry.tags
          ].filter(Boolean).join(" ").toLowerCase().includes(query);
        })
        .sort((a, b) => `${b.date || ""} ${b.startTime || ""}`.localeCompare(`${a.date || ""} ${a.startTime || ""}`));
    }

    function renderDatalists() {
      const clients = unique(state.entries.map((entry) => entry.client).filter(Boolean)).slice(0, 80);
      $("clientList").innerHTML = clients.map((client) => `<option value="${escapeHtml(client)}">`).join("");
    }

    function openImport() {
      $("importModal").classList.add("open");
      $("csvText").focus();
    }

    function closeImport() {
      $("importModal").classList.remove("open");
    }

    async function handleCsvFile(event) {
      const file = event.target.files?.[0];
      if (!file) return;
      $("csvText").value = await file.text();
    }

    function importCsv() {
      const text = $("csvText").value.trim();
      if (!text) {
        toast("가져오기 보류", "CSV 내용이 비어 있습니다.");
        return;
      }

      const rows = parseCsv(text);
      if (rows.length < 2) {
        toast("가져오기 보류", "헤더와 데이터 행을 확인해 주세요.");
        return;
      }

      const headers = rows[0].map((cell) => cell.trim());
      const imported = rows.slice(1)
        .filter((row) => row.some((cell) => String(cell || "").trim()))
        .map((row) => normalizeImportedRow(headers, row))
        .filter((entry) => entry.date || entry.project || entry.summary);

      if (!imported.length) {
        toast("가져오기 보류", "매핑 가능한 행이 없습니다.");
        return;
      }

      const mode = document.querySelector("input[name='importMode']:checked")?.value || "append";
      state.entries = mode === "replace" ? imported : [...imported, ...state.entries];
      persist();
      resetForm();
      render();
      closeImport();
      toast("가져오기 완료", `${imported.length.toLocaleString("ko-KR")}건 반영`);
    }

    function normalizeImportedRow(headers, row) {
      const source = {};
      headers.forEach((header, index) => {
        source[header] = row[index] || "";
      });

      const entry = {
        id: crypto.randomUUID ? crypto.randomUUID() : `entry-${Date.now()}-${Math.random()}`,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        date: normalizeDate(getMapped(source, "date")),
        status: normalizeStatus(getMapped(source, "status")),
        sessionType: getMapped(source, "sessionType").trim(),
        project: getMapped(source, "project").trim(),
        client: getMapped(source, "client").trim(),
        requester: getMapped(source, "requester").trim(),
        mode: normalizeMode(getMapped(source, "mode")),
        meetingLink: getMapped(source, "meetingLink").trim(),
        languagePair: getMapped(source, "languagePair").trim(),
        sourceLang: getMapped(source, "sourceLang").trim(),
        targetLang: getMapped(source, "targetLang").trim(),
        domain: getMapped(source, "domain").trim(),
        place: getMapped(source, "place").trim(),
        startTime: normalizeTime(getMapped(source, "startTime")),
        endTime: normalizeTime(getMapped(source, "endTime")),
        prepMinutes: numberOrBlank(getMapped(source, "prepMinutes")),
        durationMinutes: numberOrBlank(getMapped(source, "durationMinutes")),
        difficulty: numberOrBlank(getMapped(source, "difficulty")),
        score1: numberOrBlank(getMapped(source, "score1")),
        score2: numberOrBlank(getMapped(source, "score2")),
        score3: numberOrBlank(getMapped(source, "score3")),
        rating: numberOrBlank(getMapped(source, "rating")),
        participants: getMapped(source, "participants").trim(),
        summary: getMapped(source, "summary").trim(),
        terms: getMapped(source, "terms").trim(),
        issues: getMapped(source, "issues").trim(),
        followUp: getMapped(source, "followUp").trim(),
        memo: getMapped(source, "memo").trim(),
        tags: splitTags(getMapped(source, "tags"))
      };

      const languagePair = entry.languagePair;
      if (languagePair && (!entry.sourceLang || !entry.targetLang)) {
        const pair = splitLanguagePair(languagePair);
        entry.sourceLang = entry.sourceLang || pair[0] || "";
        entry.targetLang = entry.targetLang || pair[1] || "";
      }

      if (!entry.durationMinutes) {
        entry.durationMinutes = getDurationMinutes(entry.startTime, entry.endTime);
      }

      if (!entry.project) {
        entry.project = [entry.client, entry.domain, entry.summary].filter(Boolean)[0] || "통역 기록";
      }

      return entry;
    }

    function getMapped(rowObject, targetKey) {
      const wanted = headerMap[targetKey] || [];
      const entries = Object.entries(rowObject);
      const exact = entries.find(([header]) => wanted.includes(normalizeHeader(header)));
      if (exact) return String(exact[1] || "");
      const contains = entries.find(([header]) => {
        const normalized = normalizeHeader(header);
        return wanted.some((key) => normalized.includes(key) || key.includes(normalized));
      });
      return contains ? String(contains[1] || "") : "";
    }

    function normalizeHeader(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[()［］[\]{}]/g, " ")
        .replace(/[_\-:/]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      const normalized = text.replace(/^\uFEFF/, "");
      for (let i = 0; i < normalized.length; i += 1) {
        const char = normalized[i];
        const next = normalized[i + 1];
        if (char === '"') {
          if (quoted && next === '"') {
            cell += '"';
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (char === "," && !quoted) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }
      row.push(cell);
      rows.push(row);
      return rows.filter((items) => items.some((item) => String(item || "").trim()));
    }

    function downloadTemplate() {
      const header = csvHeader();
      downloadText(`${header.join(",")}\n`, "interpreter-log-template.csv", "text/csv;charset=utf-8");
    }

    function downloadCsv(entries, filename) {
      const header = csvHeader();
      const rows = entries.map((entry) => header.map((label) => toCsvCell(valueByHeader(entry, label))).join(","));
      downloadText([header.map(toCsvCell).join(","), ...rows].join("\n"), filename, "text/csv;charset=utf-8");
      toast("내보내기 완료", `${entries.length.toLocaleString("ko-KR")}건`);
    }

    function csvHeader() {
      return ["날짜", "회의형태", "제목", "팀", "요청자", "상태", "방식", "미팅링크", "시작시간", "종료시간", "통역시간", "잘한점", "용어", "아쉬운점", "개선", "메모", "태그"];
    }

    function valueByHeader(entry, label) {
      const lookup = {
        "날짜": entry.date,
        "회의형태": entry.sessionType,
        "제목": entry.project,
        "팀": entry.client,
        "요청자": entry.requester,
        "상태": statusLabels[normalizeStatus(entry.status)] || entry.status,
        "방식": getEntryMode(entry),
        "미팅링크": entry.meetingLink,
        "시작시간": entry.startTime,
        "종료시간": entry.endTime,
        "통역시간": entry.durationMinutes,
        "잘한점": entry.summary,
        "용어": entry.terms,
        "아쉬운점": entry.issues,
        "개선": entry.followUp,
        "메모": entry.memo,
        "태그": Array.isArray(entry.tags) ? entry.tags.join(", ") : entry.tags
      };
      return lookup[label] ?? "";
    }

    function downloadText(text, filename, type) {
      const blob = new Blob([text], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function toCsvCell(value) {
      const text = String(value ?? "");
      if (/[",\n\r]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
      return text;
    }

    function getDurationMinutes(start, end) {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(":").map(Number);
      const [eh, em] = end.split(":").map(Number);
      if ([sh, sm, eh, em].some(Number.isNaN)) return 0;
      let minutes = (eh * 60 + em) - (sh * 60 + sm);
      if (minutes < 0) minutes += 24 * 60;
      return minutes;
    }

    function updateDuration() {
      const minutes = getDurationMinutes($("startTime").value, $("endTime").value);
      $("durationChip").textContent = formatMinutes(minutes);
    }

    function getEntryMode(entry) {
      return normalizeMode([entry.mode, entry.sessionType, entry.meetingLink, entry.place].filter(Boolean).join(" "));
    }

    function extractTerms(entry) {
      return parseTermsText(entry.terms);
    }

    function parseTermsText(value) {
      return String(value || "")
        .split(/\n+/)
        .map((line) => line.trim())
        .filter(Boolean)
        .map(parseTermLine);
    }

    function parseTermLine(line) {
      const text = String(line || "").trim();
      if (!text) return { source: "", translation: "", description: "" };

      const dashParts = text.split(/\s+[–—-]\s+/).map((part) => part.trim()).filter(Boolean);
      if (dashParts.length >= 2) {
        return {
          source: dashParts[0],
          translation: dashParts[1],
          description: dashParts.slice(2).join(" - ")
        };
      }

      const equalParts = text.split(/\s*=\s*/).map((part) => part.trim()).filter(Boolean);
      if (equalParts.length >= 2) {
        const [translation, ...descriptionParts] = equalParts.slice(1).join(" = ").split(/\s+\/\s+/);
        return {
          source: equalParts[0],
          translation: (translation || "").trim(),
          description: descriptionParts.join(" / ").trim()
        };
      }

      const colonParts = text.split(/\s*:\s*/).map((part) => part.trim()).filter(Boolean);
      if (colonParts.length >= 2) {
        return {
          source: colonParts[0],
          translation: colonParts[1],
          description: colonParts.slice(2).join(": ")
        };
      }

      return { source: text, translation: "", description: "" };
    }

    function splitTags(value) {
      if (Array.isArray(value)) return value.map(String).map((item) => item.trim()).filter(Boolean);
      return String(value || "").split(/[,#;]/).map((item) => item.trim()).filter(Boolean);
    }

    function splitLanguagePair(value) {
      return String(value || "")
        .split(/\s*(?:->|→|>|\/|,|-|to|에서|으로)\s*/i)
        .map((item) => item.trim())
        .filter(Boolean)
        .slice(0, 2);
    }

    function normalizeMode(value) {
      const text = String(value || "").trim().toLowerCase();
      if (/(remote|online|zoom|call link|원격|화상|화상회의|링크)/.test(text)) return "원격";
      if (/(onsite|in[- ]?person|offline|현장|대면|통역실|회의실)/.test(text)) return "현장";
      return "현장";
    }

    function normalizeStatus(value) {
      const text = String(value || "").trim().toLowerCase();
      if (/(done|complete|완료)/.test(text)) return "done";
      if (/(follow|후속|todo|pending)/.test(text)) return "follow";
      if (/(bill|invoice|정산|청구)/.test(text)) return "billed";
      return "draft";
    }

    function normalizeDate(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const iso = text.match(/^(\d{4})[./-](\d{1,2})[./-](\d{1,2})/);
      if (iso) return `${iso[1]}-${iso[2].padStart(2, "0")}-${iso[3].padStart(2, "0")}`;
      const korean = text.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
      if (korean) return `${korean[1]}-${korean[2].padStart(2, "0")}-${korean[3].padStart(2, "0")}`;
      const parsed = new Date(text);
      return Number.isNaN(parsed.getTime()) ? text : toDateInput(parsed);
    }

    function normalizeTime(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      const match = text.match(/(\d{1,2})[:시]\s*(\d{1,2})?/);
      if (!match) return "";
      return `${match[1].padStart(2, "0")}:${(match[2] || "00").padStart(2, "0")}`;
    }

    function numberOrBlank(value) {
      if (value === "" || value === null || value === undefined) return "";
      const normalized = String(value).replace(/[^\d.-]/g, "");
      if (!normalized) return "";
      const number = Number(normalized);
      return Number.isFinite(number) ? number : "";
    }

    function safeNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function unique(values) {
      return [...new Set(values)];
    }

    function formatDate(value) {
      if (!value) return "-";
      const parts = String(value).split("-");
      if (parts.length !== 3) return value;
      return `${parts[0]}.${parts[1]}.${parts[2]}`;
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function formatLanguage(entry) {
      if (entry.languagePair) return entry.languagePair;
      if (entry.sourceLang && entry.targetLang) return `${entry.sourceLang} → ${entry.targetLang}`;
      return entry.sourceLang || entry.targetLang || "";
    }

    function formatScores(entry) {
      const scores = [entry.score1, entry.score2, entry.score3, entry.rating]
        .map((value) => value === "" || value === undefined || value === null ? "" : String(value))
        .filter(Boolean);
      const difficulty = entry.difficulty === "" || entry.difficulty === undefined || entry.difficulty === null ? "" : `난이도 ${entry.difficulty}`;
      if (difficulty && scores.length) return `${difficulty} · ${scores.join("/")}`;
      return difficulty || (scores.length ? scores.join("/") : "-");
    }

    function formatTimeRange(entry) {
      if (entry.startTime && entry.endTime) return `${entry.startTime}-${entry.endTime}`;
      return entry.startTime || entry.endTime || "-";
    }

    function formatMinutes(minutes) {
      const total = safeNumber(minutes);
      if (!total) return "0분";
      const h = Math.floor(total / 60);
      const m = total % 60;
      return h ? `${h}시간 ${m ? `${m}분` : ""}`.trim() : `${m}분`;
    }

    function formatHours(minutes) {
      const hours = safeNumber(minutes) / 60;
      if (hours === 0) return "0h";
      return `${Number.isInteger(hours) ? hours : hours.toFixed(1)}h`;
    }

    function shortText(value, maxLength) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      if (text.length <= maxLength) return text || "-";
      return `${text.slice(0, maxLength - 1)}…`;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    let toastTimer;
    function toast(title, body) {
      clearTimeout(toastTimer);
      $("toastTitle").textContent = title;
      $("toastBody").textContent = body || "";
      $("toast").classList.add("show");
      toastTimer = setTimeout(() => $("toast").classList.remove("show"), 2600);
    }
  </script>
</body>
